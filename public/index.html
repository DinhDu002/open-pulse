<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open Pulse</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --text: #e1e4eb;
      --text-muted: #8b8fa3;
      --accent: #6c5ce7;
      --success: #00b894;
      --warning: #fdcb6e;
      --danger: #e17055;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.3px;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    .period-selector {
      display: flex;
      gap: 6px;
    }

    .period-btn {
      padding: 5px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .period-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .period-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Main layout ── */
    main {
      padding: 24px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* ── Stat cards ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 900px) {
      .stat-grid { grid-template-columns: repeat(2, 1fr); }
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      transition: border-color 0.15s ease;
    }

    .stat-card:hover { border-color: var(--accent); }

    .stat-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 700;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: var(--text);
    }

    .stat-value.cost { color: var(--success); }
    .stat-value.danger { color: var(--danger); }

    .stat-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    /* ── Charts row ── */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 900px) {
      .charts-row { grid-template-columns: 1fr; }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 16px;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
    }

    .chart-wrap.tall { height: 220px; }
    .chart-wrap.medium { height: 180px; }
    .chart-wrap.donut { height: 220px; }

    /* ── Rankings row ── */
    .rankings-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    @media (max-width: 900px) {
      .rankings-row { grid-template-columns: 1fr; }
    }

    /* ── Unused banner ── */
    .unused-banner {
      background: var(--surface);
      border: 1px solid var(--warning);
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 24px;
    }

    .unused-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .unused-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: var(--warning);
    }

    .unused-badge {
      background: var(--warning);
      color: #1a1d27;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 999px;
    }

    .unused-toggle {
      font-size: 12px;
      color: var(--text-muted);
      background: none;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .unused-toggle:hover { border-color: var(--warning); color: var(--warning); }

    .unused-detail {
      display: none;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }

    .unused-detail.open { display: block; }

    .unused-section {
      margin-bottom: 12px;
    }

    .unused-section-title {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .unused-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .unused-tag {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 10px;
      font-size: 12px;
      font-family: 'SF Mono', monospace;
      color: var(--text-muted);
    }

    /* ── Sessions table ── */
    .sessions-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 24px;
    }

    .sessions-table-wrap {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }

    tbody tr {
      cursor: pointer;
      transition: background 0.1s ease;
    }

    tbody tr:hover { background: rgba(108, 92, 231, 0.07); }

    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }

    tbody tr:last-child td { border-bottom: none; }

    .td-mono {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      color: var(--accent);
    }

    .td-dir {
      color: var(--text-muted);
      font-size: 12px;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .td-cost { color: var(--success); font-family: monospace; }
    .td-dur { color: var(--text-muted); }
    .td-tools { color: var(--text-muted); text-align: center; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── Session detail ── */
    #session-detail {
      display: none;
    }

    #session-detail.open {
      display: block;
    }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .back-btn {
      padding: 6px 14px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .back-btn:hover { border-color: var(--accent); color: var(--accent); }

    .detail-title {
      font-size: 15px;
      font-weight: 600;
      font-family: monospace;
      color: var(--text);
    }

    /* ── Timeline ── */
    .timeline {
      position: relative;
      padding-left: 28px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 9px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .timeline-event {
      position: relative;
      margin-bottom: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      transition: border-color 0.15s;
    }

    .timeline-event:hover { border-color: var(--accent); }

    .timeline-dot {
      position: absolute;
      left: -23px;
      top: 14px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
    }

    .timeline-dot.tool { background: var(--accent); }
    .timeline-dot.error { background: var(--danger); }
    .timeline-dot.skill { background: var(--success); }
    .timeline-dot.agent { background: var(--warning); }

    .timeline-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .event-type-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(108, 92, 231, 0.15);
      color: var(--accent);
    }

    .event-type-badge.error {
      background: rgba(225, 112, 85, 0.15);
      color: var(--danger);
    }

    .event-type-badge.skill {
      background: rgba(0, 184, 148, 0.15);
      color: var(--success);
    }

    .event-type-badge.agent {
      background: rgba(253, 203, 110, 0.15);
      color: var(--warning);
    }

    .event-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      font-family: monospace;
    }

    .event-time {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-muted);
      font-family: monospace;
    }

    .event-meta {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Loading spinner ── */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Tab bar ── */
    .tab-bar {
      display: flex;
      gap: 6px;
      padding: 12px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      padding: 6px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .tab-btn:hover {
      border-color: var(--accent);
      color: var(--text);
    }

    .tab-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ── Inventory tables ── */
    .status-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
    }

    .status-badge.active {
      background: rgba(0, 184, 148, 0.15);
      color: var(--success);
    }

    .status-badge.unused {
      background: rgba(253, 203, 110, 0.15);
      color: var(--warning);
    }

    /* ── Inventory detail ── */
    .item-description {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      line-height: 1.6;
    }

    .keywords-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }

    .keyword-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      background: rgba(108, 92, 231, 0.15);
      color: var(--accent);
      font-family: 'SF Mono', monospace;
    }

    .highlight {
      background: rgba(108, 92, 231, 0.25);
      color: var(--text);
      padding: 1px 3px;
      border-radius: 3px;
    }

    .invocation-prompt {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'SF Mono', monospace;
      line-height: 1.5;
      word-break: break-word;
    }

    .invocation-user-prompt {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
      line-height: 1.5;
      padding: 6px 8px;
      background: rgba(108, 92, 231, 0.06);
      border-radius: 4px;
      border-left: 2px solid var(--accent);
      word-break: break-word;
    }

    .badge-trigger {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      background: rgba(108, 92, 231, 0.15);
      color: var(--accent);
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 0 8px;
      border-top: 1px solid var(--border);
      margin-top: 8px;
    }
    .pagination button {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.15s;
    }
    .pagination button:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }
    .pagination button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .page-info {
      font-size: 13px;
      color: var(--text-muted);
    }

    /* ── Navigation ── */
    .header-left { display: flex; align-items: center; gap: 24px; }
    nav { display: flex; gap: 4px; }
    nav a { padding: 6px 14px; border-radius: 6px; color: var(--text-muted); text-decoration: none; font-size: 13px; font-weight: 500; transition: all 0.15s; }
    nav a:hover { color: var(--text); background: rgba(108, 92, 231, 0.1); }
    nav a.active { color: #fff; background: var(--accent); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 600; }
    .badge-skill { background: #00b89440; color: var(--success); }
    .badge-agent { background: #fdcb6e40; color: var(--warning); }
    .badge-agent-configured { background: rgba(0, 184, 148, 0.15); color: var(--success); }
    .badge-agent-builtin { background: rgba(139, 143, 163, 0.15); color: var(--text-muted); }
    .badge-origin { background: rgba(108, 92, 231, 0.12); color: var(--accent); }
    .badge-project-global { background: rgba(139, 143, 163, 0.15); color: var(--text-muted); }
    .badge-project { background: rgba(0, 184, 148, 0.15); color: var(--success); }

    /* ── Buttons ── */
    .btn { padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .btn:hover { border-color: var(--accent); color: var(--text); }
    .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.9; }
    .btn-danger { border-color: var(--danger); color: var(--danger); }
    .btn-danger:hover { background: var(--danger); color: #fff; }

    /* ── Forms ── */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; font-family: inherit; }
    .form-group textarea { min-height: 120px; font-family: 'SF Mono', monospace; font-size: 12px; resize: vertical; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { outline: none; border-color: var(--accent); }

    /* ── Auto-evolve detail ── */
    .evolve-body { margin: 0.5rem 0 0; padding: 0.75rem; background: var(--card); border: 1px solid var(--border); border-radius: 6px; font-size: 0.8rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: var(--text-muted); max-height: 300px; overflow-y: auto; }

    /* ── Confidence bar ── */
    .confidence-bar { display: inline-block; width: 60px; height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; vertical-align: middle; margin-left: 6px; }
    .confidence-fill { display: block; height: 100%; border-radius: 3px; }

    /* ── Timeline (extended) ── */
    .timeline-event::before { content: ''; position: absolute; left: -23px; top: 16px; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); border: 2px solid var(--bg); }
    .timeline-event.tool::before { background: var(--accent); }
    .timeline-event.skill::before { background: var(--success); }
    .timeline-event.agent::before { background: var(--warning); }
    .timeline-event.session::before { background: var(--danger); }
    .timeline-label { font-size: 11px; color: var(--text-muted); }
    .timeline-name { font-weight: 600; font-size: 13px; }
    .timeline-detail { font-size: 12px; color: var(--text-muted); font-family: 'SF Mono', monospace; margin-top: 4px; word-break: break-all; }

    /* ── Learning page ── */
    .learning-layout { display: flex; gap: 0; min-height: 70vh; }
    .learning-sidebar {
      width: 200px; flex-shrink: 0; border-right: 1px solid var(--border);
      padding: 1rem 0; display: flex; flex-direction: column;
    }
    .learning-sidebar a {
      display: block; padding: 0.6rem 1.2rem; color: var(--text-muted);
      text-decoration: none; border-left: 3px solid transparent;
    }
    .learning-sidebar a.active { color: var(--accent); border-left-color: var(--accent); background: rgba(108,92,231,0.08); }
    .learning-sidebar a:hover { color: var(--text); background: rgba(255,255,255,0.03); }
    .learning-sidebar .sidebar-stats { margin-top: auto; padding: 1rem 1.2rem; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text-muted); }
    .learning-sidebar .sidebar-stats div { margin-bottom: 0.3rem; }
    .learning-sidebar .sidebar-stats span { color: var(--text); font-weight: 600; }
    .learning-main { flex: 1; padding: 1.2rem; min-width: 0; }
    .learning-footer { padding: 0.6rem 1.2rem; border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--text-muted); display: flex; gap: 1.5rem; }
    .learning-breadcrumb { font-size: 0.85rem; margin-bottom: 1rem; color: var(--text-muted); }
    .learning-breadcrumb a { color: var(--accent); text-decoration: none; }
    .confidence-bar { display: inline-block; width: 60px; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; vertical-align: middle; }
    .confidence-bar .fill { height: 100%; border-radius: 4px; }
    .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.75rem; background: var(--border); color: var(--text); }
    .badge.workflow { background: rgba(108,92,231,0.2); color: #a29bfe; }
    .badge.testing { background: rgba(0,184,148,0.2); color: #55efc4; }
    .badge.security { background: rgba(225,112,85,0.2); color: #fab1a0; }
    .badge.approved { background: rgba(0,184,148,0.2); color: var(--success); }
    .badge.dismissed { background: rgba(225,112,85,0.2); color: var(--danger); }
    .badge.pending { background: rgba(253,203,110,0.2); color: var(--warning); }
    .obs-activity-chart { height: 120px; margin-bottom: 1rem; }
    .chart-toggle { cursor: pointer; color: var(--accent); font-size: 0.85rem; margin-bottom: 0.5rem; }
    .filter-row { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 1rem; }
    .filter-row select, .filter-row input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 0.4rem 0.6rem; border-radius: 4px; font-size: 0.85rem; }

    /* ── Prompt cards ── */
    .card.clickable { cursor: pointer; transition: border-color 0.2s; }
    .card.clickable:hover { border-color: var(--accent); }
    .card-list { display: flex; flex-direction: column; gap: 10px; }

    /* ── Filter bar ── */
    .filter-bar {
      display: flex; gap: 12px; margin-bottom: 20px;
      align-items: center; flex-wrap: wrap;
    }
    .filter-input { flex: 1; min-width: 200px; }
    .filter-select { min-width: 140px; }

    /* ── Pagination (prompts) ── */
    .btn.active {
      background: var(--accent); color: #fff; border-color: var(--accent);
    }

    /* ── Flow timeline ── */
    .flow-timeline {
      border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden;
    }
    .flow-event {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }
    .flow-event:last-child { border-bottom: none; }
    .flow-event:hover { background: rgba(108, 92, 231, 0.06); }
    .flow-event.expanded { background: var(--surface); }
    .flow-seq {
      color: var(--text-muted); font-size: 11px;
      width: 20px; text-align: right; flex-shrink: 0;
    }
    .flow-dot {
      width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
    }
    .flow-main { flex: 1; display: flex; align-items: center; gap: 0; min-width: 0; }
    .flow-name { font-weight: 500; font-family: 'SF Mono', monospace; font-size: 12px; flex-shrink: 0; }
    .flow-detail {
      color: var(--text-muted); margin-left: 8px; font-size: 12px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      flex: 1; min-width: 0;
    }
    .flow-duration { color: var(--text-muted); font-size: 11px; flex-shrink: 0; }
    .flow-status { font-size: 11px; width: 16px; text-align: center; flex-shrink: 0; }
    .flow-detail-panel {
      padding: 12px 16px 12px 56px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      border-left: 3px solid var(--accent);
    }
    .flow-detail-panel:last-child { border-bottom: none; }
    .flow-detail-label {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 4px; font-weight: 600;
    }
    .flow-detail-pre {
      background: var(--surface); padding: 8px 12px;
      border-radius: 4px; font-size: 11px; overflow-x: auto;
      margin: 0 0 8px 0; white-space: pre-wrap;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* ── Prompt group headers in session detail ── */
    .prompt-group-header {
      padding: 10px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
    }
    .prompt-group-header.clickable { cursor: pointer; }
    .prompt-group-header.clickable:hover { background: var(--surface); }
    .prompt-group-text { font-weight: 500; font-size: 13px; }
    .prompt-group-stats { font-size: 11px; color: var(--text-muted); }

    /* ── Prompt detail header ── */
    .prompt-header { margin-bottom: 20px; }
    .prompt-text { font-size: 16px; margin-bottom: 6px; line-height: 1.4; word-break: break-word; overflow-wrap: break-word; }
    .back-link {
      color: var(--accent); text-decoration: none; font-size: 13px;
      display: inline-block; margin-bottom: 12px;
    }
    .back-link:hover { text-decoration: underline; }

    /* ── Prompt card title ── */
    .prompt-card-title {
      font-size: 14px; line-height: 1.4; margin-bottom: 8px;
      color: var(--text); word-break: break-word;
    }
    .prompt-card-meta {
      display: flex; gap: 16px; font-size: 12px;
      color: var(--text-muted); margin-bottom: 10px; flex-wrap: wrap;
    }
    .badge-row { display: flex; gap: 6px; flex-wrap: wrap; }
  </style>
</head>
